<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#fdf2f8"/>

  <!-- spaghetti straps -->
  <line x1="127" y1="75" x2="130" y2="100" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="173" y1="75" x2="170" y2="100" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round"/>

  <!-- dress body - trapezoid shape flaring outward -->
  <path d="M126 100 C120 105 118 115 118 120 L95 235 L205 235 L182 120 C182 115 180 105 174 100 Z" fill="#fbcfe8" stroke="#ec4899" stroke-width="2"/>

  <!-- chest panel / bodice detail -->
