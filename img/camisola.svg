  <!-- empire waist seam -->
  <path d="M120 128 Q150 122 180 128" fill="none" stroke="#ec4899" stroke-width="1.2" opacity="0.6"/>

  <!-- lace hem at bottom -->
  <path d="M95 235 Q101 227 107 235 Q113 227 119 235 Q125 227 131 235 Q137 227 143 235 Q149 227 155 235 Q161 227 167 235 Q173 227 179 235 Q185 227 191 235 Q197 227 203 235 Q205 227 205 235" fill="none" stroke="#be185d" stroke-width="1.5"/>

  <!-- lace at neckline -->
  <path d="M126 100 Q131 93 136 100 Q141 93 146 100 Q151 93 156 100 Q161 93 166 100 Q171 93 174 100" fill="none" stroke="#be185d" stroke-width="1.5"/>

  <text x="150" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#9d174d" letter-spacing="2">CAMISOLAS</text>
</svg>
